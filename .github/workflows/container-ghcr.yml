name: container-ghcr

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}
      decision_reason: ${{ steps.decision.outputs.decision_reason }}
      matched_sha: ${{ steps.decision.outputs.matched_sha }}
      matched_files: ${{ steps.decision.outputs.matched_files }}
    steps:
      - name: Decide whether a scheduled build is needed
        id: decision
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, time, timedelta, timezone
          from zoneinfo import ZoneInfo

          owner, repo = os.environ["GITHUB_REPOSITORY"].split("/", 1)
          default_branch = os.environ["DEFAULT_BRANCH"]
          event_name = os.environ["EVENT_NAME"]
          output_path = os.environ["GITHUB_OUTPUT"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          token = os.environ["GITHUB_TOKEN"]

          def set_output(key: str, value: str) -> None:
              with open(output_path, "a", encoding="utf-8") as fh:
                  fh.write(f"{key}={value}\n")

          def append_summary(lines: list[str]) -> None:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write("\n".join(lines) + "\n")

          def github_api(path: str, params: dict[str, str] | None = None):
              url = f"https://api.github.com{path}"
              if params:
                  url += "?" + urllib.parse.urlencode(params)
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "genegalleon-container-ghcr",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          if event_name == "workflow_dispatch":
              set_output("should_build", "1")
              set_output("decision_reason", "manual dispatch")
              set_output("matched_sha", "manual")
              set_output("matched_files", "manual dispatch")
              append_summary(
                  [
                      "Manual dispatch requested.",
                      "",
                      "- Build decision: run",
                      "- Reason: workflow_dispatch bypasses the scheduled-change filter",
                  ]
              )
              raise SystemExit(0)

          now_jst = datetime.now(ZoneInfo("Asia/Tokyo"))
          today_jst = now_jst.date()
          start_jst = datetime.combine(
              today_jst - timedelta(days=1),
              time.min,
              tzinfo=ZoneInfo("Asia/Tokyo"),
          )
          end_jst = datetime.combine(
              today_jst,
              time.min,
              tzinfo=ZoneInfo("Asia/Tokyo"),
          )
          start_utc = start_jst.astimezone(timezone.utc).replace(microsecond=0)
          end_utc = end_jst.astimezone(timezone.utc).replace(microsecond=0)
          since = start_utc.isoformat().replace("+00:00", "Z")
          until = end_utc.isoformat().replace("+00:00", "Z")

          watched_paths = {
              ".dockerignore",
              ".github/workflows/container-ghcr.yml",
          }
          watched_prefixes = ("container/",)

          page = 1
          commit_count = 0
          matched_sha = ""
          matched_files: list[str] = []

          while True:
              commits = github_api(
                  f"/repos/{owner}/{repo}/commits",
                  {
                      "sha": default_branch,
                      "since": since,
                      "until": until,
                      "per_page": "100",
                      "page": str(page),
                  },
              )
              if not commits:
                  break

              commit_count += len(commits)
              for commit in commits:
                  sha = commit["sha"]
                  details = github_api(f"/repos/{owner}/{repo}/commits/{sha}")
                  files = [item["filename"] for item in details.get("files", [])]
                  matched = sorted(
                      {
                          path
                          for path in files
                          if path in watched_paths
                          or any(path.startswith(prefix) for prefix in watched_prefixes)
                      }
                  )
                  if matched:
                      matched_sha = sha[:7]
                      matched_files = matched
                      break

              if matched_sha or len(commits) < 100:
                  break
              page += 1

          if matched_sha:
              reason = "container-related changes found on the previous JST day"
              set_output("should_build", "1")
              set_output("decision_reason", reason)
              set_output("matched_sha", matched_sha)
              set_output("matched_files", ",".join(matched_files))
              append_summary(
                  [
                      "Scheduled publish preflight:",
                      "",
                      "- Build decision: run",
                      f"- JST window: {start_jst.isoformat()} to {end_jst.isoformat()}",
                      f"- Matching commit: `{matched_sha}`",
                      f"- Matching paths: {', '.join(matched_files)}",
                  ]
              )
          else:
              reason = "no container-related changes found on the previous JST day"
              set_output("should_build", "0")
              set_output("decision_reason", reason)
              set_output("matched_sha", "none")
              set_output("matched_files", "none")
              append_summary(
                  [
                      "Scheduled publish preflight:",
                      "",
                      "- Build decision: skip",
                      f"- JST window: {start_jst.isoformat()} to {end_jst.isoformat()}",
                      f"- Commits inspected on `{default_branch}`: {commit_count}",
                      "- Matching paths: none",
                  ]
              )
          PY

  build-and-push:
    needs: check-trigger
    if: |
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      needs.check-trigger.outputs.should_build == '1'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="$(basename "${GITHUB_REPOSITORY}")"
          image="ghcr.io/${owner}/${repo_name}"
          date_tag="$(date -u +%Y%m%d)"
          short_sha="${GITHUB_SHA::7}"
          immutable_tag="${date_tag}-${short_sha}"
          build_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "immutable_tag=${immutable_tag}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=sha-${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight env coverage check
        shell: bash
        run: |
          set -euo pipefail
          container/scripts/check_env_coverage.sh .

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.immutable_tag }}
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Build trigger:"
            echo "- ${{ needs.check-trigger.outputs.decision_reason }}"
            echo "- matched commit: ${{ needs.check-trigger.outputs.matched_sha }}"
            echo "- matched paths: ${{ needs.check-trigger.outputs.matched_files }}"
            echo ""
            echo "Pushed image tags:"
            echo "- ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.immutable_tag }}"
            echo "- ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}"
            echo "- ${{ steps.vars.outputs.image }}:latest"
          } >> "${GITHUB_STEP_SUMMARY}"
