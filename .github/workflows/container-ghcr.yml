name: container-ghcr

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="$(basename "${GITHUB_REPOSITORY}")"
          image="ghcr.io/${owner}/${repo_name}"
          date_tag="$(date -u +%Y%m%d)"
          short_sha="${GITHUB_SHA::7}"
          immutable_tag="${date_tag}-${short_sha}"
          build_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "immutable_tag=${immutable_tag}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=sha-${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight env coverage check
        shell: bash
        run: |
          set -euo pipefail
          container/scripts/check_env_coverage.sh .

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.immutable_tag }}
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Pushed image tags:"
            echo "- ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.immutable_tag }}"
            echo "- ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}"
            echo "- ${{ steps.vars.outputs.image }}:latest"
          } >> "${GITHUB_STEP_SUMMARY}"
