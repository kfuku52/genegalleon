name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: workflow/tests/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r workflow/tests/requirements.txt

      - name: Run smoke tests
        run: |
          python -m pytest -q -x \
            workflow/tests/test_busco_hmmsearch_wrapper.py \
            workflow/tests/test_gg_input_generation_end_to_end.py::test_gg_input_generation_single_mode_end_to_end

  python-fast:
    needs: python-smoke
    name: python-fast (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: workflow/tests/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r workflow/tests/requirements.txt

      - name: Run fast Python tests
        shell: bash
        run: |
          tests=()
          while IFS= read -r test_path; do
            tests+=("${test_path}")
          done < <(find workflow/tests -maxdepth 1 -type f -name "test_*.py" | sort)

          exclude=(
            "workflow/tests/test_busco_hmmsearch_wrapper.py"
            "workflow/tests/test_format_species_inputs_download.py"
            "workflow/tests/test_generate_species_trait.py"
            "workflow/tests/test_genome_evolution_protein_mode.py"
            "workflow/tests/test_gg_input_generation_end_to_end.py"
            "workflow/tests/test_hgt_end_to_end.py"
            "workflow/tests/test_shell_static_safety.py"
          )

          filtered=()
          for test_path in "${tests[@]}"; do
            skip=0
            for excluded in "${exclude[@]}"; do
              if [[ "${test_path}" == "${excluded}" ]]; then
                skip=1
                break
              fi
            done
            if [[ "${skip}" -eq 0 ]]; then
              filtered+=("${test_path}")
            fi
          done

          python -m pytest -q "${filtered[@]}"

  python-heavy:
    needs: python-smoke
    name: python-heavy (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: true
      matrix:
        shard:
          - name: download-and-traits
            tests: >-
              workflow/tests/test_format_species_inputs_download.py
              workflow/tests/test_generate_species_trait.py
          - name: workflow-integrations
            tests: >-
              workflow/tests/test_busco_hmmsearch_wrapper.py
              workflow/tests/test_genome_evolution_protein_mode.py
              workflow/tests/test_gg_input_generation_end_to_end.py
              workflow/tests/test_hgt_end_to_end.py

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: workflow/tests/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r workflow/tests/requirements.txt

      - name: Run heavy Python tests
        run: |
          python -m pytest -q ${{ matrix.shard.tests }}

  shell-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal test dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Bash syntax check for workflow scripts
        run: |
          set -euo pipefail
          while IFS= read -r script; do
            bash -n "${script}"
          done < <(find workflow -type f -name "*.sh" | sort)

      - name: Shell static safety checks
        run: |
          python -m pytest -q workflow/tests/test_shell_static_safety.py

  r-script-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R test dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: always
          packages: any::sessioninfo
          extra-packages: |
            any::ggplot2
            any::ape

      - name: Parse-check workflow R scripts
        run: |
          Rscript workflow/tests/test_r_scripts_parse.R

      - name: Run lightweight R unit tests
        run: |
          Rscript workflow/tests/test_pgls_common_rphylopars.R
          Rscript workflow/tests/test_treevis_main.R
